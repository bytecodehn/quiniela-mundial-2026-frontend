<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iniciar sesión — Quiniela Mundial 2026</title>
  <link rel="stylesheet" href="css/tokens.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-visual">
      <div class="auth-visual-content">
        <div class="auth-visual-icon">⚽</div>
        <h2>¡Bienvenido de vuelta!</h2>
        <p>Ingresa a tu cuenta para seguir pronosticando, compitiendo y subiendo posiciones en el ranking.</p>
        <div style="margin-top:var(--space-8)">
          <div class="hero-stat">
            <div class="hero-stat-value">+50K</div>
            <div class="hero-stat-label">Jugadores activos</div>
          </div>
        </div>
      </div>
    </div>
    <div class="auth-form">
      <div class="auth-form-wrap">
        <div class="auth-logo">
          <span class="auth-logo-icon">QM</span>
          <span>Quiniela 2026</span>
        </div>
        <h1 class="auth-title">Iniciar sesión</h1>
        <p class="auth-subtitle">Ingresa tus credenciales para continuar.</p>

        <form onsubmit="event.preventDefault(); window.location.href='dashboard.html'">
          <div class="form-group">
            <label class="form-label">Correo electrónico</label>
            <input type="email" class="form-input form-input-white" placeholder="tu@correo.com" required />
          </div>
          <div class="form-group">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-input form-input-white" placeholder="••••••••" required />
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-6)">
            <label class="form-checkbox">
              <input type="checkbox" checked /> Recordarme
            </label>
            <a href="#" style="font-size:0.85rem;font-weight:600;color:var(--green)">¿Olvidaste tu contraseña?</a>
          </div>
          <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Iniciar sesión</button>
        </form>

        <div class="auth-divider">o continúa con</div>

        <button class="btn btn-secondary" style="width:100%">
          <span>🌐</span> Google
        </button>

        <div class="auth-footer">
          ¿No tienes cuenta? <a href="register.html">Regístrate</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
